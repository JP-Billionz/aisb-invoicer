services:
  - type: web
    name: aisb-invoicer
    runtime: node
    plan: starter
    region: ohio
    branch: main
    rootDir: .
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss --skip-generate && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: EMAIL_FROM
        value: "AISB Invoicer <noreply@aisolutionsbb.com>"
      - key: SENDGRID_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: aisb-invoicer-db
          property: connectionString

databases:
  - name: aisb-invoicer-db
    plan: basic-256mb
    region: ohio
    databaseName: aisb_invoicer
    user: aisb_invoicer
    postgresMajorVersion: "16"
